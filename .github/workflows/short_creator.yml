name: Short Creator Techtalk

on:
  #schedule:
  #- cron: '0 4,10,16,22 * * *'  # 00:00,06:00,12:00,18:00 America/New_York (EDT = UTC-4)
  workflow_dispatch:         # Manual trigger

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to push state files back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-noto-color-emoji

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run automation
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHANNELS: ${{ secrets.TELEGRAM_CHANNELS }}
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
        run: |
          python short_creator.py

      - name: Save state files back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .published_ids.json
          git diff --cached --quiet || git commit -m "chore: update published IDs [skip ci]"
          git push
