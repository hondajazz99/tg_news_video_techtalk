name: Bilingual YouTube Shorts Creator
 
on:
  schedule:
    - cron: '0 */5 * * *' # Every 5 hours
    #- cron: '0 2 * * *'   # 09:00 ICT
    #- cron: '0 7 * * *'   # 14:00 ICT
    #- cron: '0 12 * * *'  # 19:00 ICT
  workflow_dispatch:
    inputs:
      pipeline:
        description: 'Which pipeline to run'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - en_only
          - vi_only
      max_posts:
        description: 'Max Telegram posts per channel (1–10)'
        required: false
        default: '3'
      privacy:
        description: 'YouTube privacy status'
        required: false
        default: 'private'
        type: choice
        options:
          - private
          - public
          - unlisted
      publish_delay_hours:
        description: 'Hours until scheduled publish (0 = immediate)'
        required: false
        default: '1'

env:
  PYTHON_VERSION: '3.11'
  DATA_BRANCH: 'data/published-ids'

jobs:
  # ════════════════════════════════════════════════════════════════════
  # Job 1 – English pipeline  (@xeonbitchannel → YouTube EN channel)
  # ════════════════════════════════════════════════════════════════════
  create_en_short:
    name: 'EN — @xeonbitchannel → YouTube EN'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: >
      github.event_name != 'workflow_dispatch' ||
      inputs.pipeline == 'both' ||
      inputs.pipeline == 'en_only'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore EN published IDs from data branch
        run: |
          git fetch origin "$DATA_BRANCH" 2>/dev/null || true
          if git show "origin/$DATA_BRANCH:.published_ids_en.json" 2>/dev/null \
              > .published_ids_en.json; then
            echo "Restored .published_ids_en.json ($(wc -c < .published_ids_en.json) bytes)"
          else
            echo "No existing file — starting fresh"
            echo "[]" > .published_ids_en.json
          fi

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-dejavu-core \
            fonts-freefont-ttf
          fc-cache -f

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            "edge-tts>=7.2,<8" \
            "moviepy==1.0.*" \
            "numpy==1.26.*" \
            "Pillow==10.*" \
            "requests==2.*" \
            "google-auth==2.*" \
            "google-auth-oauthlib==1.*" \
            "google-api-python-client==2.*"
      - name: Sanitise music.mp3
        run: |
          if [ -f music.mp3 ]; then
            ffmpeg -y -i music.mp3 \
            -ar 44100 -ac 2 -b:a 192k \
            -avoid_negative_ts make_zero \
            music_sanitised.mp3
            mv music_sanitised.mp3 music.mp3
            echo "music.mp3 re-encoded OK"
          else
            echo "No music.mp3 found — skipping"
          fi
        
      - name: Re-encode B-roll clips to fix duration metadata
        run: |
          if [ -d clips ] && ls clips/*.mp4 clips/*.mov 2>/dev/null | head -1 > /dev/null; then
            mkdir -p clips_fixed
            for f in clips/*.mp4 clips/*.mov clips/*.mkv clips/*.avi clips/*.webm; do
              [ -f "$f" ] || continue
              base=$(basename "$f")
              echo "Re-encoding: $base"
              ffmpeg -y -i "$f" \
                -c:v libx264 -preset fast -crf 23 \
                -c:a aac -b:a 128k \
                -movflags +faststart \
                -fflags +genpts \
                clips_fixed/"${base%.*}.mp4" 2>/dev/null \
                && echo "  OK: $base" \
                || echo "  SKIP (error): $base"
            done
            rm -rf clips
            mv clips_fixed clips
            echo "All clips re-encoded."
          else
            echo "No clips found — skipping."
          fi

      - name: Run EN pipeline
        env:
          TELEGRAM_TOKEN:             ${{ secrets.TELEGRAM_TOKEN }}
          YOUTUBE_CLIENT_SECRETS_EN:  ${{ secrets.YOUTUBE_CLIENT_SECRETS_EN }}
          TG_CHANNEL_EN:              "@xeonbitchannel"
          TG_CHANNEL_NAME_EN:         "xeonbitchannel"
          TTS_VOICE_EN:               ${{ vars.TTS_VOICE_EN || 'en-SG-LunaNeural' }}
          DESCRIPTION_EN:             ${{ vars.DESCRIPTION_EN || 'Latest crypto & tech news in English' }}
          TAGS_EN:                    ${{ vars.TAGS_EN || '["Shorts","Crypto","Bitcoin","Tech","News"]' }}
          BRAND_HASHTAGS_EN:          ${{ vars.BRAND_HASHTAGS_EN || '["xeonbit24","xeonbit24.com"]' }}
          OUTRO_CTA_EN:               ${{ vars.OUTRO_CTA_EN || 'Follow for latest crypto news. Like & Subscribe!' }}
          INTRO_LABEL_EN:             ${{ vars.INTRO_LABEL_EN || 'BREAKING' }}
          PLAYLIST_ID_EN:             ${{ vars.PLAYLIST_ID_EN || 'PLKfhqWP2rL8LS6mS4eJk0sx43sD4x8TeV' }}
          PUBLISH_DELAY_HOURS_EN:     ${{ inputs.publish_delay_hours || '1' }}
          PRIVACY_STATUS:             ${{ inputs.privacy || 'private' }}
          MUSIC_OPTION:               "music.mp3"
          LOGO_PATH_EN:               "brand_logo.png"
          CLIPS_DIR_EN:               "clips"
          MAX_TELEGRAM_POSTS:         ${{ inputs.max_posts || '3' }}
        run: python short_creator_bilingual7seq2.py --lang en

      - name: Save EN published IDs to data branch
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # ── Stash the freshly-written file OUTSIDE the workspace ──────────
          # Must do this BEFORE switching branches — git checkout would overwrite
          # $GITHUB_WORKSPACE, making cp source and dest the same file.
          UPDATED_FILE="$(mktemp /tmp/published_ids_en_XXXX.json)"
          cp "$GITHUB_WORKSPACE/.published_ids_en.json" "$UPDATED_FILE"

          # ── Retry loop: fetch → build commit → push (up to 5 attempts) ────
          # The VI job may push to the same branch concurrently. Each retry
          # re-fetches so our commit is always on top of the latest remote tip.
          MAX_TRIES=5
          for i in $(seq 1 $MAX_TRIES); do
            echo "--- Push attempt $i/$MAX_TRIES ---"

            # Always fetch the very latest tip of the data branch
            git fetch origin "$DATA_BRANCH" 2>/dev/null || true

            # Build a fresh _tmp_data branch on top of the current remote tip
            git branch -D _tmp_data 2>/dev/null || true

            # ── Discard workspace changes so checkout never aborts ────────────
            git stash --include-untracked 2>/dev/null || git checkout -- . 2>/dev/null || true
            git clean -fd 2>/dev/null || true
            # ─────────────────────────────────────────────────────────────────

            if git ls-remote --exit-code origin "$DATA_BRANCH" > /dev/null 2>&1; then
              git checkout -b _tmp_data "origin/$DATA_BRANCH"
            else
              git checkout --orphan _tmp_data
              git reset --hard
            fi

            # Place the updated file (safe — $UPDATED_FILE is in /tmp)
            cp "$UPDATED_FILE" .published_ids_en.json

            git add .published_ids_en.json
            if git diff --cached --quiet; then
              echo "No changes to .published_ids_en.json — skipping push"
              rm -f "$UPDATED_FILE"
              exit 0
            fi

            git commit -m "chore: update EN published IDs [run ${{ github.run_id }}]"

            # Push — will succeed if no one else pushed since our fetch
            if git push origin "_tmp_data:$DATA_BRANCH"; then
              echo "Pushed updated EN published IDs to $DATA_BRANCH"
              rm -f "$UPDATED_FILE"
              exit 0
            fi

            echo "Push rejected (concurrent write). Retrying in 5s..."
            git checkout main 2>/dev/null || git checkout -
            sleep 5
          done

          echo "ERROR: Failed to push after $MAX_TRIES attempts."
          rm -f "$UPDATED_FILE"
          exit 1

      - name: Upload EN video artifact (on failure, for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: en-video-debug-${{ github.run_id }}
          path: output_short_en.mp4
          retention-days: 1
          if-no-files-found: ignore

  # ════════════════════════════════════════════════════════════════════
  # Job 2 – Vietnamese pipeline  (@TechTalk66 → YouTube VI channel)
  # ════════════════════════════════════════════════════════════════════
  create_vi_short:
    name: 'VI — @TechTalk66 → YouTube VI'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: >
      github.event_name != 'workflow_dispatch' ||
      inputs.pipeline == 'both' ||
      inputs.pipeline == 'vi_only'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore VI published IDs from data branch
        run: |
          git fetch origin "$DATA_BRANCH" 2>/dev/null || true
          if git show "origin/$DATA_BRANCH:.published_ids_vi.json" 2>/dev/null \
              > .published_ids_vi.json; then
            echo "Restored .published_ids_vi.json ($(wc -c < .published_ids_vi.json) bytes)"
          else
            echo "No existing file — starting fresh"
            echo "[]" > .published_ids_vi.json
          fi

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-dejavu-core \
            fonts-freefont-ttf \
            fonts-noto
          fc-cache -f

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            "edge-tts>=7.2,<8" \
            "moviepy==1.0.*" \
            "numpy==1.26.*" \
            "Pillow==10.*" \
            "requests==2.*" \
            "google-auth==2.*" \
            "google-auth-oauthlib==1.*" \
            "google-api-python-client==2.*"
      - name: Sanitise music.mp3
        run: |
          if [ -f music.mp3 ]; then
            ffmpeg -y -i music.mp3 \
            -ar 44100 -ac 2 -b:a 192k \
            -avoid_negative_ts make_zero \
            music_sanitised.mp3
            mv music_sanitised.mp3 music.mp3
            echo "music.mp3 re-encoded OK"
          else
            echo "No music.mp3 found — skipping"
          fi
      - name: Re-encode B-roll clips to fix duration metadata
        run: |
          if [ -d clips ] && ls clips/*.mp4 clips/*.mov 2>/dev/null | head -1 > /dev/null; then
            mkdir -p clips_fixed
            for f in clips/*.mp4 clips/*.mov clips/*.mkv clips/*.avi clips/*.webm; do
              [ -f "$f" ] || continue
              base=$(basename "$f")
              echo "Re-encoding: $base"
              ffmpeg -y -i "$f" \
                -c:v libx264 -preset fast -crf 23 \
                -c:a aac -b:a 128k \
                -movflags +faststart \
                -fflags +genpts \
                clips_fixed/"${base%.*}.mp4" 2>/dev/null \
                && echo "  OK: $base" \
                || echo "  SKIP (error): $base"
            done
            rm -rf clips
            mv clips_fixed clips
            echo "All clips re-encoded."
          else
            echo "No clips found — skipping."
          fi

      - name: Run VI pipeline
        env:
          TELEGRAM_TOKEN:             ${{ secrets.TELEGRAM_TOKEN }}
          YOUTUBE_CLIENT_SECRETS_VI:  ${{ secrets.YOUTUBE_CLIENT_SECRETS_VI }}
          TG_CHANNEL_VI:              "@TechTalk66"
          TG_CHANNEL_NAME_VI:         "TechTalk66"
          TTS_VOICE_VI:               ${{ vars.TTS_VOICE_VI || 'vi-VN-HoaiMyNeural' }}
          DESCRIPTION_VI:             ${{ vars.DESCRIPTION_VI || 'Tin tức công nghệ và crypto bằng tiếng Việt' }}
          TAGS_VI:                    ${{ vars.TAGS_VI || '["Shorts","CryptoViet","TinTuc","CongNghe"]' }}
          BRAND_HASHTAGS_VI:          ${{ vars.BRAND_HASHTAGS_VI || '["techtalk66","techtalk"]' }}
          OUTRO_CTA_VI:               ${{ vars.OUTRO_CTA_VI || 'Theo dõi để cập nhật tin tức mới nhất. Like & Đăng ký!' }}
          INTRO_LABEL_VI:             ${{ vars.INTRO_LABEL_VI || 'TIN MỚI' }}
          PLAYLIST_ID_VI:             ${{ vars.PLAYLIST_ID_VI || 'PLL7BH4dMy6VxNRcIWVpKYlC-9AJR3Tytn' }}
          PUBLISH_DELAY_HOURS_VI:     ${{ inputs.publish_delay_hours || '1' }}
          PRIVACY_STATUS:             ${{ inputs.privacy || 'private' }}
          MUSIC_OPTION:               "music.mp3"
          LOGO_PATH_VI:               "brand_logo.png"
          CLIPS_DIR_VI:               "clips"
          MAX_TELEGRAM_POSTS:         ${{ inputs.max_posts || '3' }}
        run: python short_creator_bilingual7seq2.py --lang vi

      - name: Save VI published IDs to data branch
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # ── Stash the freshly-written file OUTSIDE the workspace ──────────
          UPDATED_FILE="$(mktemp /tmp/published_ids_vi_XXXX.json)"
          cp "$GITHUB_WORKSPACE/.published_ids_vi.json" "$UPDATED_FILE"

          # ── Retry loop: fetch → build commit → push (up to 5 attempts) ────
          MAX_TRIES=5
          for i in $(seq 1 $MAX_TRIES); do
            echo "--- Push attempt $i/$MAX_TRIES ---"

            git fetch origin "$DATA_BRANCH" 2>/dev/null || true

            git branch -D _tmp_data 2>/dev/null || true

            # ── Discard workspace changes so checkout never aborts ────────────
            git stash --include-untracked 2>/dev/null || git checkout -- . 2>/dev/null || true
            git clean -fd 2>/dev/null || true
            # ─────────────────────────────────────────────────────────────────

            if git ls-remote --exit-code origin "$DATA_BRANCH" > /dev/null 2>&1; then
              git checkout -b _tmp_data "origin/$DATA_BRANCH"
            else
              git checkout --orphan _tmp_data
              git reset --hard
            fi

            cp "$UPDATED_FILE" .published_ids_vi.json

            git add .published_ids_vi.json
            if git diff --cached --quiet; then
              echo "No changes to .published_ids_vi.json — skipping push"
              rm -f "$UPDATED_FILE"
              exit 0
            fi

            git commit -m "chore: update VI published IDs [run ${{ github.run_id }}]"

            if git push origin "_tmp_data:$DATA_BRANCH"; then
              echo "Pushed updated VI published IDs to $DATA_BRANCH"
              rm -f "$UPDATED_FILE"
              exit 0
            fi

            echo "Push rejected (concurrent write). Retrying in 5s..."
            git checkout main 2>/dev/null || git checkout -
            sleep 5
          done

          echo "ERROR: Failed to push after $MAX_TRIES attempts."
          rm -f "$UPDATED_FILE"
          exit 1

      - name: Upload VI video artifact (on failure, for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vi-video-debug-${{ github.run_id }}
          path: output_short_vi.mp4
          retention-days: 1
          if-no-files-found: ignore
