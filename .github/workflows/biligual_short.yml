name: Bilingual YouTube Shorts Creator

on:
  schedule:
    - cron: '0 2 * * *'   # 09:00 ICT
    - cron: '0 8 * * *'   # 15:00 ICT
    - cron: '0 14 * * *'  # 21:00 ICT

  workflow_dispatch:
    inputs:
      pipeline:
        description: 'Which pipeline to run'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - en_only
          - vi_only
      max_posts:
        description: 'Max Telegram posts per channel (1–10)'
        required: false
        default: '3'
      privacy:
        description: 'YouTube privacy status'
        required: false
        default: 'private'
        type: choice
        options:
          - private
          - public
          - unlisted
      publish_delay_hours:
        description: 'Hours until scheduled publish (0 = immediate)'
        required: false
        default: '1'

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ════════════════════════════════════════════════════════════════════
  # Job 1 – English pipeline  (@xeonbitchannel → YouTube EN channel)
  # ════════════════════════════════════════════════════════════════════
  create_en_short:
    name: 'EN — @xeonbitchannel → YouTube EN'
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_dispatch' ||
      inputs.pipeline == 'both' ||
      inputs.pipeline == 'en_only'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # music.mp3, brand_logo.png are committed to the repo root
        # and will be present after checkout — no secrets needed for them

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-dejavu-core \
            fonts-freefont-ttf
          fc-cache -f

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            "edge-tts==6.1.*" \
            "moviepy==1.0.*" \
            "numpy==1.26.*" \
            "Pillow==10.*" \
            "requests==2.*" \
            "google-auth==2.*" \
            "google-auth-oauthlib==1.*" \
            "google-api-python-client==2.*"

      - name: Restore EN published IDs
        uses: actions/cache@v4
        with:
          path: .published_ids_en.json
          key: published-ids-en-${{ github.run_id }}
          restore-keys: published-ids-en-

      # ── Clips: optional secret — unpack into clips/ if provided ───────
      #- name: Restore EN clips from secret (optional)
      #  if: ${{ secrets.CLIPS_EN_B64 != '' }}
      #  run: |
      #    mkdir -p clips
      #    echo "$CLIPS_EN_B64" | base64 -d | tar -xzf - -C clips/
      #  env:
      #    CLIPS_EN_B64: ${{ secrets.CLIPS_EN_B64 }}

      - name: Run EN pipeline
        env:
          TELEGRAM_TOKEN:             ${{ secrets.TELEGRAM_TOKEN }}
          YOUTUBE_CLIENT_SECRETS_EN:  ${{ secrets.YOUTUBE_CLIENT_SECRETS_EN }}
          # Channel / identity
          TG_CHANNEL_EN:              "@xeonbitchannel"
          TG_CHANNEL_NAME_EN:         "xeonbitchannel"
          TTS_VOICE_EN:               ${{ vars.TTS_VOICE_EN || 'en-SG-LunaNeural' }}
          # Content
          DESCRIPTION_EN:             ${{ vars.DESCRIPTION_EN || 'Latest crypto & tech news in English' }}
          TAGS_EN:                    ${{ vars.TAGS_EN || '["Shorts","Crypto","Bitcoin","Tech","News"]' }}
          BRAND_HASHTAGS_EN:          ${{ vars.BRAND_HASHTAGS_EN || '["xeonbit24","xeonbit24.com"]' }}
          OUTRO_CTA_EN:               ${{ vars.OUTRO_CTA_EN || 'Follow for latest crypto news. Like & Subscribe!' }}
          INTRO_LABEL_EN:             ${{ vars.INTRO_LABEL_EN || 'BREAKING' }}
          # YouTube
          PLAYLIST_ID_EN:             ${{ vars.PLAYLIST_ID_EN || '' }}
          PUBLISH_DELAY_HOURS_EN:     ${{ inputs.publish_delay_hours || '1' }}
          PRIVACY_STATUS:             ${{ inputs.privacy || 'private' }}
          # Assets — all in repo root, clips optional
          MUSIC_OPTION:               "music.mp3"
          LOGO_PATH_EN:               "brand_logo.png"
          CLIPS_DIR_EN:               "clips"
          # Runtime
          MAX_TELEGRAM_POSTS:         ${{ inputs.max_posts || '3' }}
        run: python short_creator_bilingual.py --lang en

      - name: Upload EN video artifact (on failure, for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: en-video-debug-${{ github.run_id }}
          path: output_short_en.mp4
          retention-days: 1
          if-no-files-found: ignore

      - name: Save EN published IDs
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .published_ids_en.json
          key: published-ids-en-${{ github.run_id }}

  # ════════════════════════════════════════════════════════════════════
  # Job 2 – Vietnamese pipeline  (@Techtalk66 → YouTube VI channel)
  # ════════════════════════════════════════════════════════════════════
  create_vi_short:
    name: 'VI — @Techtalk66 → YouTube VI'
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_dispatch' ||
      inputs.pipeline == 'both' ||
      inputs.pipeline == 'vi_only'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-dejavu-core \
            fonts-freefont-ttf \
            fonts-noto
          fc-cache -f

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            "edge-tts==6.1.*" \
            "moviepy==1.0.*" \
            "numpy==1.26.*" \
            "Pillow==10.*" \
            "requests==2.*" \
            "google-auth==2.*" \
            "google-auth-oauthlib==1.*" \
            "google-api-python-client==2.*"

      - name: Restore VI published IDs
        uses: actions/cache@v4
        with:
          path: .published_ids_vi.json
          key: published-ids-vi-${{ github.run_id }}
          restore-keys: published-ids-vi-

      # ── Clips: optional secret — unpack into clips/ if provided ───────
      #- name: Restore VI clips from secret (optional)
      #  if: ${{ secrets.CLIPS_VI_B64 != '' }}
      #  run: |
      #    mkdir -p clips
      #    echo "$CLIPS_VI_B64" | base64 -d | tar -xzf - -C clips/
      #  env:
      #    CLIPS_VI_B64: ${{ secrets.CLIPS_VI_B64 }}

      - name: Run VI pipeline
        env:
          TELEGRAM_TOKEN:             ${{ secrets.TELEGRAM_TOKEN }}
          YOUTUBE_CLIENT_SECRETS_VI:  ${{ secrets.YOUTUBE_CLIENT_SECRETS_VI }}
          # Channel / identity
          TG_CHANNEL_VI:              "@Techtalk66"
          TG_CHANNEL_NAME_VI:         "Techtalk66"
          TTS_VOICE_VI:               ${{ vars.TTS_VOICE_VI || 'vi-VN-HoaiMyNeural' }}
          # Content
          DESCRIPTION_VI:             ${{ vars.DESCRIPTION_VI || 'Tin tức công nghệ và crypto bằng tiếng Việt' }}
          TAGS_VI:                    ${{ vars.TAGS_VI || '["Shorts","CryptoViet","TinTuc","CongNghe"]' }}
          BRAND_HASHTAGS_VI:          ${{ vars.BRAND_HASHTAGS_VI || '["techtalk66","techtalk"]' }}
          OUTRO_CTA_VI:               ${{ vars.OUTRO_CTA_VI || 'Theo dõi để cập nhật tin tức mới nhất. Like & Đăng ký!' }}
          INTRO_LABEL_VI:             ${{ vars.INTRO_LABEL_VI || 'TIN MỚI' }}
          # YouTube
          PLAYLIST_ID_VI:             ${{ vars.PLAYLIST_ID_VI || '' }}
          PUBLISH_DELAY_HOURS_VI:     ${{ inputs.publish_delay_hours || '1' }}
          PRIVACY_STATUS:             ${{ inputs.privacy || 'private' }}
          # Assets — all in repo root, clips optional
          MUSIC_OPTION:               "music.mp3"
          LOGO_PATH_VI:               "brand_logo.png"
          CLIPS_DIR_VI:               "clips"
          # Runtime
          MAX_TELEGRAM_POSTS:         ${{ inputs.max_posts || '3' }}
        run: python short_creator_bilingual.py --lang vi

      - name: Upload VI video artifact (on failure, for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vi-video-debug-${{ github.run_id }}
          path: output_short_vi.mp4
          retention-days: 1
          if-no-files-found: ignore

      - name: Save VI published IDs
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .published_ids_vi.json
          key: published-ids-vi-${{ github.run_id }}

  # ════════════════════════════════════════════════════════════════════
  # Job 3 – Notify on completion
  # ════════════════════════════════════════════════════════════════════
  notify:
    name: Notify via Telegram
    runs-on: ubuntu-latest
    needs: [create_en_short, create_vi_short]
    if: always()

    steps:
      - name: Build status message
        id: msg
        run: |
          EN_STATUS="${{ needs.create_en_short.result }}"
          VI_STATUS="${{ needs.create_vi_short.result }}"

          EN_ICON="✅"; VI_ICON="✅"
          [[ "$EN_STATUS" == "failure" ]] && EN_ICON="❌"
          [[ "$EN_STATUS" == "skipped" ]] && EN_ICON="⏭"
          [[ "$VI_STATUS" == "failure" ]] && VI_ICON="❌"
          [[ "$VI_STATUS" == "skipped" ]] && VI_ICON="⏭"

          MESSAGE="🎬 *Bilingual Shorts Run*%0A"
          MESSAGE+="${EN_ICON} EN (@xeonbitchannel): ${EN_STATUS}%0A"
          MESSAGE+="${VI_ICON} VI (@Techtalk66): ${VI_STATUS}%0A"
          MESSAGE+="🔗 [View run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          echo "message=$MESSAGE" >> $GITHUB_OUTPUT

      #- name: Send Telegram notification (optional)
      #  if: ${{ secrets.NOTIFY_TELEGRAM_TOKEN != '' && secrets.NOTIFY_CHAT_ID != '' }}
      #  run: |
      #    curl -s -X POST \
      #      "https://api.telegram.org/bot${{ secrets.NOTIFY_TELEGRAM_TOKEN }}/sendMessage" \
      #      -d chat_id="${{ secrets.NOTIFY_CHAT_ID }}" \
      #      -d parse_mode="Markdown" \
      #      -d text="${{ steps.msg.outputs.message }}"
