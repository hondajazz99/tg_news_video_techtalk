name: TG News → YouTube Shorts

# ──────────────────────────────────────────────────────────────
# Lịch chạy tự động: mỗi ngày 4 lần (cứ 6 tiếng 1 lần).
# Có thể trigger thủ công từ tab Actions → "Run workflow".
# ──────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: "0 1,7,13,19 * * *"   # 01:00 / 07:00 / 13:00 / 19:00 UTC
  workflow_dispatch:                # cho phép chạy tay
    inputs:
      tg_channel:
        description: "Kênh Telegram (override TG_CHANNEL)"
        required: false
        default: ""
      dry_run_upload:
        description: "Dry-run bước upload YouTube (true/false)"
        required: false
        default: "false"

# Chỉ cho phép 1 job chạy cùng lúc (tránh race condition với .published_ids.json)
concurrency:
  group: tg-news-video
  cancel-in-progress: false

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout repo ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Khôi phục .published_ids.json từ cache ──
      # File này theo dõi bài đã publish — lưu trữ giữa các lần chạy qua cache.
      - name: Restore published IDs cache
        uses: actions/cache@v4
        with:
          path: .published_ids.json
          key: published-ids-${{ github.ref_name }}
          restore-keys: |
            published-ids-

      # ── 3. Cài Python & dependencies ──
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            requests beautifulsoup4 gtts moviepy Pillow \
            langdetect numpy scipy \
            google-api-python-client google-auth \
            google-auth-oauthlib google-auth-httplib2

      # ── 4. Cài FFmpeg ──
      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      # ── 5. Giải nén assets từ secrets (clips, nhạc nền, logo) ──
      # Tất cả file nhị phân (clips/, bg_music.mp3, brand_logo.png)
      # được nén thành .tar.gz và lưu dưới dạng GitHub Secret (base64-encoded).
      # Xem README.md → "Thêm assets vào GitHub Secrets" để biết cách tạo.
      - name: Restore video clips
        env:
          CLIPS_TAR_B64: ${{ secrets.CLIPS_TAR_B64 }}
        run: |
          if [ -n "$CLIPS_TAR_B64" ]; then
            echo "$CLIPS_TAR_B64" | base64 -d | tar -xzf - -C .
            echo "[•] clips/ restored ($(ls clips/ | wc -l) files)"
          else
            echo "[!] Secret CLIPS_TAR_B64 không được set — tạo clip placeholder..."
            mkdir -p clips
            # Tạo 1 clip màu đen 30s làm placeholder để pipeline không lỗi
            ffmpeg -f lavfi -i color=c=black:s=1080x1920:r=30 -t 30 \
                   -c:v libx264 -pix_fmt yuv420p clips/placeholder.mp4 -y -loglevel error
          fi

      - name: Restore background music
        env:
          BG_MUSIC_B64: ${{ secrets.BG_MUSIC_B64 }}
        run: |
          if [ -n "$BG_MUSIC_B64" ]; then
            echo "$BG_MUSIC_B64" | base64 -d > bg_music.mp3
            echo "[•] bg_music.mp3 restored"
          else
            echo "[!] Secret BG_MUSIC_B64 không được set — tạo nhạc im lặng..."
            ffmpeg -f lavfi -i anullsrc=r=44100:cl=stereo -t 60 \
                   -c:a libmp3lame bg_music.mp3 -y -loglevel error
          fi

      - name: Restore brand logo
        env:
          BRAND_LOGO_B64: ${{ secrets.BRAND_LOGO_B64 }}
        run: |
          if [ -n "$BRAND_LOGO_B64" ]; then
            echo "$BRAND_LOGO_B64" | base64 -d > brand_logo.png
            echo "[•] brand_logo.png restored"
          else
            echo "[•] Secret BRAND_LOGO_B64 không được set — chạy không có logo"
          fi

      # ── 6. Cài DejaVu font (cho caption CC) ──
      - name: Install fonts
        run: sudo apt-get install -y fonts-dejavu-core

      # ── 7. Tạo video ──
      - name: Generate video
        id: generate
        env:
          TG_CHANNEL: ${{ github.event.inputs.tg_channel || vars.TG_CHANNEL || 'Techtalk66' }}
          NUM_TG_POSTS: ${{ vars.NUM_TG_POSTS || '3' }}
          TG_FETCH_LIMIT: ${{ vars.TG_FETCH_LIMIT || '20' }}
          YT_PLAYLIST_ID: ${{ vars.YT_PLAYLIST_ID || 'PLL7BH4dMy6VxNRcIWVpKYlC-9AJR3Tytn' }}
          BRAND_LOGO_PATH: brand_logo.png
          LOGO_POSITION: ${{ vars.LOGO_POSITION || 'top-left' }}
        run: python tg_news_video_59s_best.py

      # ── 8. Upload lên YouTube (bỏ qua nếu không có bài mới) ──
      - name: Upload to YouTube Shorts
        if: steps.generate.outputs.has_new_posts == 'true'
        env:
          YOUTUBE_SERVICE_ACCOUNT_JSON: ${{ secrets.YOUTUBE_SERVICE_ACCOUNT_JSON }}
          VIDEO_META_FILE: video_meta.json
        run: |
          DRY="${{ github.event.inputs.dry_run_upload }}"
          if [ "$DRY" = "true" ]; then
            python youtube_upload.py --dry-run
          else
            python youtube_upload.py
          fi

      # ── 9. Lưu lại .published_ids.json ──
      # Cache sẽ tự update ở bước "Restore published IDs cache" khi key thay đổi.
      # Để đảm bảo luôn lưu bản mới nhất, ta commit file vào repo.
      - name: Commit updated published IDs
        if: steps.generate.outputs.has_new_posts == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update .published_ids.json [skip ci]"
          file_pattern: .published_ids.json
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      # ── 10. Upload video là artifact (để tải về nếu cần debug) ──
      - name: Upload video artifact
        if: steps.generate.outputs.has_new_posts == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: output-video-${{ github.run_number }}
          path: |
            output_video.mp4
            video_meta.json
            yt_description.txt
          retention-days: 3

      # ── 11. Log summary ──
      - name: Summary
        if: always()
        run: |
          echo "## TG News Video Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| has_new_posts | ${{ steps.generate.outputs.has_new_posts }} |" >> $GITHUB_STEP_SUMMARY
          echo "| video_title | ${{ steps.generate.outputs.video_title }} |" >> $GITHUB_STEP_SUMMARY
          echo "| youtube_url | ${{ steps.generate.outputs.youtube_url }} |" >> $GITHUB_STEP_SUMMARY
